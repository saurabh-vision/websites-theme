---
layout: page
title: Email Splitter
---

<div class="card p-4">
    <p class="text-muted mb-4">Break long founder emails into actionable sentences. Improve clarity and response rates.</p>
    
    <div class="form-group mb-4">
        <label for="email" class="form-label font-weight-bold">Paste Email Content</label>
        <textarea id="email" class="form-control" style="height: 200px; background: rgba(0,0,0,0.1); color: white; border: 1px solid var(--accent-color);" placeholder="Paste long email text here..."></textarea>
    </div>
    
    <button onclick="split()" class="btn btn-primary btn-lg w-100 mb-4">Split Email →</button>

    <div id="results" style="display: none;">
        <h3 class="h5 mb-3"><i class="fas fa-tasks mr-2 text-accent"></i> Actionable Blocks:</h3>
        <div id="list"></div>
    </div>
</div>

<script>
    function split() {
        const text = document.getElementById('email').value;
        const results = document.getElementById('results');
        const list = document.getElementById('list');
        list.innerHTML = '';
        
        if (!text.trim()) return;

        // Split by sentence endings but keep the endings
        const sentences = text.split(/(?<=[.!?])\s+/).filter(s => s.trim().length > 5);

        results.style.display = 'block';
        sentences.forEach(s => {
            const div = document.createElement('div');
            div.className = 'block mb-2 p-3 rounded';
            div.style.background = 'rgba(255,255,255,0.05)';
            div.style.borderLeft = '4px solid var(--accent-color)';
            div.innerText = s.trim();
            list.appendChild(div);
        });
        
        // Scroll to results
        results.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
</script>

<style>
    .text-accent { color: var(--accent-color); }
    #email::placeholder { color: rgba(255,255,255,0.3); }
</style>
