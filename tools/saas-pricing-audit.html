---
layout: page
title: SaaS Pricing Audit
---

<div class="card p-4">
    <p class="text-muted mb-4">Instantly audit your pricing page copy for high-conversion patterns and psychological pricing errors.</p>
    
    <div class="form-group mb-4">
        <label for="copy" class="form-label font-weight-bold">Pricing Page Copy</label>
        <textarea id="copy" class="form-control" style="height: 150px; background: rgba(0,0,0,0.1); color: white; border: 1px solid var(--accent-color);" placeholder="Paste your pricing page text here..."></textarea>
    </div>
    
    <button onclick="audit()" class="btn btn-primary btn-lg w-100 mb-4">Run Audit →</button>

    <div id="results" style="display: none;">
        <h3 class="h5 mb-3"><i class="fas fa-microscope mr-2 text-accent"></i> Audit Results:</h3>
        <div id="list" class="list-group list-group-flush" style="background: transparent;"></div>
    </div>
</div>

<script>
    function audit() {
        const text = document.getElementById('copy').value.toLowerCase();
        const results = document.getElementById('results');
        const list = document.getElementById('list');
        list.innerHTML = '';
        
        if (!text.trim()) return;

        const checks = [
            { pattern: /free trial|get started|try for free|sign up/i, pass: "Action-oriented CTAs detected.", fail: "Missing clear action-oriented CTAs." },
            { pattern: /\$|€|£|rs|inr/i, pass: "Currency symbols detected (Anchor established).", fail: "Prices might be hidden or currency anchors are missing." },
            { pattern: /month|year|annual|monthly/i, pass: "Billing intervals clearly mentioned.", fail: "Billing clarity (monthly vs annual) is weak or missing." },
            { pattern: /popular|best value|recommended/i, pass: "Tier highlighting (Social Proof) detected.", fail: "No tier is highlighted as 'Popular' or 'Recommended'." },
            { pattern: /cancel anytime|no credit card|risk free/i, pass: "Friction-reduction language detected.", fail: "Consider adding 'Cancel anytime' or 'No credit card required'." }
        ];

        results.style.display = 'block';
        checks.forEach(c => {
            const item = document.createElement('div');
            item.className = 'list-group-item bg-transparent border-0 px-0 py-2 d-flex align-items-start';
            
            const isPass = text.match(c.pattern);
            const icon = isPass ? '<i class="fas fa-check-circle text-success mr-2 mt-1"></i>' : '<i class="fas fa-times-circle text-danger mr-2 mt-1"></i>';
            const status = isPass ? '<span class="badge badge-success mr-2">PASS</span>' : '<span class="badge badge-danger mr-2">FAIL</span>';
            
            item.innerHTML = `${icon} <div class="flex-grow-1">${status} ${isPass ? c.pass : c.fail}</div>`;
            list.appendChild(item);
        });

        results.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
</script>

<style>
    .text-accent { color: var(--accent-color); }
    #copy::placeholder { color: rgba(255,255,255,0.3); }
    .badge-success { background-color: #28a745 !important; }
    .badge-danger { background-color: #dc3545 !important; }
</style>
