<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Pricing Audit Tool</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; padding: 2rem; max-width: 600px; margin: 0 auto; line-height: 1.6; background: #f8f9fa; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { margin-top: 0; color: #1a1a1a; }
        textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 1rem; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        #results { margin-top: 2rem; display: none; }
        .fail { color: #d9534f; font-weight: bold; }
        .pass { color: #5cb85c; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚡ SaaS Pricing Audit</h1>
        <p>Instantly check your pricing page copy for high-conversion patterns.</p>
        <textarea id="copy" placeholder="Paste your pricing page text here..."></textarea>
        <button onclick="audit()">Run Audit</button>

        <div id="results">
            <h3>Audit Results:</h3>
            <ul id="list"></ul>
        </div>
    </div>

    <script>
        function audit() {
            const text = document.getElementById('copy').value.toLowerCase();
            const results = document.getElementById('results');
            const list = document.getElementById('list');
            list.innerHTML = '';
            
            const checks = [
                { pattern: /free trial|get started/i, pass: "CTAs detected.", fail: "Missing clear action-oriented CTAs." },
                { pattern: /\$|€|£/, pass: "Currency symbols found.", fail: "Prices might be hidden or missing." },
                { pattern: /month|year|annual/i, pass: "Billing intervals mentioned.", fail: "Billing clarity (monthly vs annual) is weak." }
            ];

            results.style.display = 'block';
            checks.forEach(c => {
                const li = document.createElement('li');
                if (text.match(c.pattern)) {
                    li.innerHTML = `<span class="pass">PASS</span>: ${c.pass}`;
                } else {
                    li.innerHTML = `<span class="fail">FAIL</span>: ${c.fail}`;
                }
                list.appendChild(li);
            });
        }
    </script>
</body>
</html>
